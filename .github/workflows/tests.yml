name: Tests

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"

jobs:
  docker-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        varnish_version:
          - "6.0.17"
          - "7.6.5"
          - "7.7.3"
          - "8.0.1"
    name: Varnish ${{ matrix.varnish_version }}
    steps:
      - uses: actions/checkout@v6

      - name: Build and test
        run: |
          docker build . \
            --build-arg "VARNISH_VERSION=${{ matrix.varnish_version }}" \
            -t "libvmod-queryfilter:local-${{ matrix.varnish_version }}"
