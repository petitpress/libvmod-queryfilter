name: Build

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"

jobs:
  linux-build:
    strategy:
      fail-fast: false
      matrix:
        # To add a new Varnish version, append it here.
        # The packagecloud repo is derived as varnishXY (e.g. "7.6" -> "varnish76").
        varnish_version: ["7.6", "7.7", "8.0"]
        distro:
          - name: Ubuntu
            runner: ubuntu-latest
          - name: Rocky Linux
            runner: ubuntu-latest
            container: rockylinux:9
    runs-on: ${{ matrix.distro.runner }}
    container: ${{ matrix.distro.container }}
    name: Native / Linux ${{ matrix.distro.name }} / Varnish ${{ matrix.varnish_version }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Ubuntu)
        if: "!matrix.distro.container"
        run: |
          VERSION_SHORT=$(echo "${{ matrix.varnish_version }}" | tr -d '.')
          curl -s "https://packagecloud.io/install/repositories/varnishcache/varnish${VERSION_SHORT}/script.deb.sh" | sudo bash
          # libpcre3-dev was dropped in Ubuntu 24.04 (Noble); fetch debs from Debian
          # Bookworm via Docker (same approach used in the project Dockerfile).
          docker run --rm -v /tmp/pcre3:/out debian:bookworm-slim \
            bash -c 'apt-get update -qq && apt-get download -q \
              libpcre3 libpcre3-dev libpcre16-3 libpcre32-3 libpcrecpp0v5 \
              && mv *.deb /out/'
          sudo dpkg -i /tmp/pcre3/*.deb
          sudo apt-get install -y \
            varnish-dev \
            autoconf \
            automake \
            libtool \
            pkg-config \
            python3-docutils

      - name: Install dependencies (Rocky Linux)
        if: matrix.distro.container == 'rockylinux:9'
        run: |
          VERSION_SHORT=$(echo "${{ matrix.varnish_version }}" | tr -d '.')
          dnf install -y epel-release
          curl -s "https://packagecloud.io/install/repositories/varnishcache/varnish${VERSION_SHORT}/script.rpm.sh" | bash
          dnf install -y \
            varnish-devel \
            autoconf \
            automake \
            libtool \
            pkgconfig \
            pcre-devel \
            python3-docutils

      - name: Build and test
        run: |
          ./autogen.sh
          ./configure && make && make check

  # macOS and FreeBSD install current Varnish version from their
  # respective package managers - version pinning is not supported.
  macos-build:
    runs-on: macos-latest
    name: Native / macOS (Darwin)
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (macOS)
        run: |
          brew install \
            varnish \
            autoconf \
            automake \
            libtool \
            pkg-config \
            pcre

      - name: Build and test
        run: |
          ./autogen.sh
          ./configure && make && make check

  freebsd-build:
    runs-on: ubuntu-latest
    name: Native / FreeBSD
    steps:
      - uses: actions/checkout@v6

      - name: Build and test
        uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: freebsd
          version: "14.2"
          run: |
            # varnish is not always present in the quarterly repo; switch to latest.
            sudo mkdir -p /usr/local/etc/pkg/repos
            printf 'FreeBSD: { url: "pkg+http://pkg.FreeBSD.org/${ABI}/latest" }\n' \
              | sudo tee /usr/local/etc/pkg/repos/FreeBSD.conf
            # Suppress minor OS version mismatch errors from the latest repo.
            echo "IGNORE_OSVERSION = yes;" | sudo tee -a /usr/local/etc/pkg.conf
            sudo pkg update -f
            sudo pkg install -y \
              varnish7 \
              autoconf \
              automake \
              libtool \
              pkgconf \
              pcre \
              python3
            ./autogen.sh
            ./configure && make && make check
