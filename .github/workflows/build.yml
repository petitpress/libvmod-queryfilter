name: Build

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"

jobs:
  linux-build:
    strategy:
      fail-fast: false
      matrix:
        # To add a new Varnish version, append it here.
        # The packagecloud repo is derived as varnishXY (e.g. "7.6" -> "varnish76").
        varnish_version: ["6.4", "7.6", "7.7"]
        distro:
          - name: Ubuntu
            runner: ubuntu-latest
          - name: Rocky Linux
            runner: ubuntu-latest
            container: rockylinux:9
    runs-on: ${{ matrix.distro.runner }}
    container: ${{ matrix.distro.container }}
    name: Native / Linux ${{ matrix.distro.name }} / Varnish ${{ matrix.varnish_version }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Ubuntu)
        if: "!matrix.distro.container"
        run: |
          VERSION_SHORT=$(echo "${{ matrix.varnish_version }}" | tr -d '.')
          curl -s "https://packagecloud.io/install/repositories/varnishcache/varnish${VERSION_SHORT}/script.deb.sh" | sudo bash
          sudo apt-get install -y \
            varnish-dev \
            autoconf \
            automake \
            libtool \
            pkg-config \
            libpcre3-dev \
            python3-docutils

      - name: Install dependencies (Rocky Linux)
        if: matrix.distro.container == 'rockylinux:9'
        run: |
          VERSION_SHORT=$(echo "${{ matrix.varnish_version }}" | tr -d '.')
          dnf install -y epel-release
          curl -s "https://packagecloud.io/install/repositories/varnishcache/varnish${VERSION_SHORT}/script.rpm.sh" | bash
          dnf install -y \
            varnish-devel \
            autoconf \
            automake \
            libtool \
            pkgconfig \
            pcre-devel \
            python3-docutils

      - name: Build and test
        run: |
          ./autogen.sh
          ./configure && make && make check

  # macOS and FreeBSD install whatever Varnish version is current in their
  # respective package managers - version pinning isn't supported there.
  macos-build:
    runs-on: macos-latest
    name: Native / macOS (Darwin)
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (macOS)
        run: |
          brew install \
            varnish \
            autoconf \
            automake \
            libtool \
            pkg-config \
            pcre

      - name: Build and test
        run: |
          ./autogen.sh
          ./configure && make && make check

  freebsd-build:
    runs-on: ubuntu-latest
    name: Native / FreeBSD
    steps:
      - uses: actions/checkout@v6

      - name: Build and test
        uses: cross-platform-actions/action@v0.25.0
        with:
          operating_system: freebsd
          version: "14.1"
          run: |
            sudo pkg install -y \
              varnish \
              autoconf \
              automake \
              libtool \
              pkgconf \
              pcre
            ./autogen.sh
            ./configure && make && make check
